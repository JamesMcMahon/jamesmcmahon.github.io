{{ define "main" }}
<div class="card">
    <h2>About Me</h2>
    <p>Software engineer specializing in elegant solutions and clean architecture.</p>
    <div class="social-links">
        <Link href="#"><Github /></Link>
        <Link href="#"><Linkedin /></Link>
    </div>
</div>

<div class="card">
    {{ $posts := where .Site.RegularPages "Section" "blog" }}
    {{ if $posts }}
        <ul>
            {{ range $posts }}
                <li><a href="{{ .RelPermalink }}">{{ .Title }}</a></li>
            {{ end }}
        </ul>
    {{ else }}
        <p>No Content Yet!</p>
    {{ end }}
</div>
{{ end }}
