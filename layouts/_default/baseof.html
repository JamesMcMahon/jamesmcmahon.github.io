<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>{{ .Title }}</title>
    {{ $minifiedCSS := (resources.Get "css/main.css" | resources.Minify) }}
    {{ if .Site.Params.inlineCSS }}
        <style>{{ $minifiedCSS.Content | safeCSS }}</style>
    {{ else }}
        <link rel="stylesheet" href="{{ $minifiedCSS.RelPermalink }}">
    {{ end }}
</head>
<body class="container">
    <header>
        <div class="logo">
            <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="10" y="60" width="30" height="30" rx="4" fill="#E63946" />
                <rect x="35" y="35" width="30" height="30" rx="4" fill="#2A9D8F" />
                <rect x="60" y="10" width="30" height="30" rx="4" fill="#E9C46A" />
            </svg>
        </div>
        <div>
            <h1>James McMahon</h1>
            <p class="subtitle">A Software Engineer</p>
        </div>
        <nav>
            {{ range .Site.Menus.main }}
                <a href="{{ .URL }}">{{ .Name }}</a>
            {{ end }}
        </nav>
    </header>
    <main>
        {{ block "main" . }}{{ end }}
    </main>
</body>
</html>
